spring.application.name=farm-produce-api
server.port=8080

# MySQL: fix wrong password with mysql -u root -p, then match below or use MYSQL_PASSWORD env
spring.datasource.url=jdbc:mysql://localhost:3306/farm_produce?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Sai@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# If upgrading from older builds: UPDATE farm_produce SET status='GRADED' WHERE status='APPROVED';
# Optional: UPDATE procurement_orders SET order_date = UTC_TIMESTAMP() WHERE order_date IS NULL;
# Or drop DB and restart.

